<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Club | Sorteador</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary-color: #8b5cf6;
            --accent-color: #3b82f6;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent), 
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.9rem; }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            padding: 1rem;
            box-sizing: border-box;
            resize: none;
            font-family: inherit;
            margin-bottom: 1.5rem;
            transition: border 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover { transform: scale(1.02); opacity: 0.9; }

        .resultado-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px dashed var(--primary-color);
            border-radius: 12px;
            animation: fadeIn 0.5s ease-out;
        }

        .resultado-nome {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloud Club</h1>
        <p>Sorteador Especial para Universitários</p>
        
        <form method="POST">
            <textarea name="nomes" placeholder="Insira os nomes separados por ;">{{ nomes }}</textarea>
            <button type="submit">Realizar Sorteio</button>
        </form>

        {% if resultado %}
            <div class="resultado-box">
                <span style="color: var(--primary-color); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Vencedor:</span>
                <span class="resultado-nome">🎉 {{ resultado }}</span>
            </div>
        {% endif %}
    </div>
</body>
</html>
