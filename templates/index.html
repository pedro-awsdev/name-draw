<!DOCTYPE html>
<html>
<head>
    <title>Sorteador Universitário - AWS</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        textarea { width: 300px; height: 100px; }
        .resultado { color: green; font-size: 2em; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Sorteador de Nomes</h1>
    <form method="POST">
        <textarea name="nomes" placeholder="Nome 1; Nome 2; Nome 3">{{ nomes }}</textarea><br><br>
        <button type="submit">Sortear!</button>
    </form>

    {% if resultado %}
        <div class="resultado">Ganhador: {{ resultado }}</div>
    {% endif %}
</body>
</html>
